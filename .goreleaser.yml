version: 2

builds:
  - env:
    - CGO_ENABLED=0
    main: ./cmd/claudecodeproxy
    goos:
    - darwin
    - linux
    goarch:
    - amd64
    - arm64

archives:
  - format: tar.gz

brews:
  - repository:
      owner: simon0191
      name: homebrew-tap
    token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/simon0191/claudecodeproxy"
    description: "Anthropic Messages API proxy for the Claude CLI"
    license: "MIT"
